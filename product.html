<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Retro INC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="product-page" data-product-route="true">
  <header class="premium-nav" data-premium-nav>
    <a class="premium-brand" href="index.html">Retro INC</a>
    <nav class="premium-nav-links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="products.html" aria-current="page">Products</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="catalog-hero product-hero">
      <div class="catalog-hero-media">
        <img data-product-hero-image src="assets/img1.jpg" alt="Premium product hero image">
      </div>
      <div class="catalog-hero-overlay"></div>
      <div class="catalog-shell catalog-hero-copy">
        <p class="catalog-eyebrow" data-product-kicker>Product Detail</p>
        <h1 data-product-title>Product Name</h1>
        <p data-product-copy>Luxury handcrafted furniture presented through a premium gallery-style product page.</p>
      </div>
    </section>

    <section class="product-summary">
      <div class="catalog-shell product-summary-grid">
        <div class="product-summary-chip">
          <span>Category</span>
          <strong data-product-details-category>Chairs</strong>
        </div>
        <div class="product-summary-chip">
          <span>Material</span>
          <strong data-product-details-material>---</strong>
        </div>
        <div class="product-summary-chip">
          <span>Price</span>
          <strong data-product-details-price>---</strong>
        </div>
        <a class="product-summary-link" data-product-details-link href="chairs.html">Back to Catalog</a>
      </div>
    </section>

    <section class="catalog-book-section">
      <div class="catalog-shell">
        <div class="catalog-book-head">
          <div>
            <p class="catalog-section-label">Gallery flipbook</p>
            <h2>Flip through the product gallery</h2>
          </div>
          <div class="catalog-page-counter">
            <span data-book-current>01</span>
            <span>/</span>
            <span data-book-total>03</span>
          </div>
        </div>

        <div class="catalog-book-controls">
          <div class="catalog-book-controls-group">
            <button class="catalog-control-button" type="button" data-book-prev>Previous</button>
            <button class="catalog-control-button" type="button" data-book-next>Next</button>
          </div>
          <div class="catalog-book-controls-group catalog-book-zoom-group">
            <button class="catalog-control-button" type="button" data-book-zoom-out>-</button>
            <input class="catalog-zoom-slider" type="range" min="0.9" max="1.12" step="0.01" value="1.02" data-book-zoom>
            <button class="catalog-control-button" type="button" data-book-zoom-in>+</button>
          </div>
        </div>

        <div class="catalog-book-stage" data-book-stage>
          <div class="catalog-book-content" data-book-content></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/catalog-data.js"></script>
  <script src="js/flipbook.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
