<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Retro INC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="products-page">
    <header class="premium-nav" data-premium-nav>
        <a class="premium-brand" href="index.html">Retro INC</a>
        <nav class="premium-nav-links" aria-label="Primary">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="products.html" aria-current="page">Products</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="products-hero">
            <div class="products-hero-media">
                <img src="assets/img1.jpg" alt="Premium Retro INC furniture">
            </div>
            <div class="products-hero-overlay"></div>
            <div class="products-shell products-hero-content">
                <p class="products-eyebrow">Retro INC Collection</p>
                <h1>Our Products</h1>
                <p class="products-hero-copy">Luxury handcrafted furniture and premium decor, curated as a cinematic category journey.</p>
            </div>
        </section>

        <section class="products-story" id="products-story" aria-label="Products category storytelling">
            <div class="products-story-sticky">
                <div class="products-story-bg-stack" aria-hidden="true"></div>
                <div class="products-story-card-stack"></div>
                <nav class="products-story-timeline" aria-label="Product categories"></nav>
            </div>
        </section>

        <section class="products-final">
            <div class="products-shell products-final-inner">
                <p class="products-eyebrow">Catalog system</p>
                <h2>Each category opens into its own editorial flipbook and product pages.</h2>
                <a class="products-final-button" href="chairs.html">Start with Chairs</a>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/catalog-data.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
