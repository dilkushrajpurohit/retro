<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables | Retro INC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="catalog-page" data-category="tables">
  <header class="premium-nav" data-premium-nav>
    <a class="premium-brand" href="index.html">Retro INC</a>
    <nav class="premium-nav-links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="products.html" aria-current="page">Products</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="catalog-hero">
      <div class="catalog-hero-media">
        <img data-catalog-hero-image src="assets/img2.jpg" alt="Premium furniture catalog hero">
      </div>
      <div class="catalog-hero-overlay"></div>
      <div class="catalog-shell catalog-hero-copy">
        <p class="catalog-eyebrow" data-catalog-kicker>Tables</p>
        <h1 data-catalog-title>Tables</h1>
        <p data-catalog-copy>Luxury handcrafted dining and lounge tables with balanced proportions and premium material depth.</p>
      </div>
    </section>

    <section class="catalog-book-section">
      <div class="catalog-shell">
        <div class="catalog-book-head">
          <div>
            <p class="catalog-section-label">Editorial catalog</p>
            <h2>Flip through the tables collection</h2>
          </div>
          <div class="catalog-page-counter">
            <span data-book-current>01</span>
            <span>/</span>
            <span data-book-total>04</span>
          </div>
        </div>

        <div class="catalog-book-controls">
          <div class="catalog-book-controls-group">
            <button class="catalog-control-button" type="button" data-book-prev>&larr; Previous</button>
            <button class="catalog-control-button" type="button" data-book-next>Next &rarr;</button>
          </div>
          <div class="catalog-book-controls-group">
            <label class="catalog-jump-label" for="tables-jump">Jump to page</label>
            <input id="tables-jump" class="catalog-jump-input" type="number" min="1" step="1" value="1" data-book-jump>
            <button class="catalog-control-button" type="button" data-book-jump-go>Go</button>
          </div>
          <div class="catalog-book-controls-group catalog-book-zoom-group">
            <button class="catalog-control-button" type="button" data-book-zoom-out>-</button>
            <input class="catalog-zoom-slider" type="range" min="0.9" max="1.12" step="0.01" value="1" data-book-zoom>
            <button class="catalog-control-button" type="button" data-book-zoom-in>+</button>
          </div>
        </div>

        <div class="catalog-book-stage" data-book-stage>
          <div class="catalog-book-content" data-book-content></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
  <script src="js/catalog-data.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
