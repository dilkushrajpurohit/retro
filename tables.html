<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables Catalog | Retro INC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="catalog-page product-book-page">
  <header class="premium-nav" data-premium-nav>
    <a class="premium-brand" href="index.html">Retro INC</a>
    <nav class="premium-nav-links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="products.html">Products</a>
      <a href="showroom-access.html">Showroom</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="catalog-hero product-hero">
      <div class="catalog-hero-media">
        <img src="assets/img3.jpg" alt="Reclaimed wood table collection">
      </div>
      <div class="catalog-hero-overlay"></div>
      <div class="catalog-shell catalog-hero-copy">
        <p class="catalog-eyebrow">Catalog</p>
        <h1>Table collection</h1>
        <p>Dining tables, coffee tables, and side tables designed to carry the material story of reclaimed wood through the center of the room.</p>
      </div>
    </section>

    <section class="catalog-book-section">
      <div class="catalog-shell">
        <div class="catalog-book-head">
          <div>
            <p class="catalog-eyebrow">Flipbook</p>
            <h2>Browse the table range</h2>
          </div>
          <div class="catalog-page-counter"><span data-catalog-page-current>01</span><span>/</span><span data-catalog-page-total>04</span></div>
        </div>

        <div class="catalog-book-controls catalog-book-controls--side catalog-book-controls--left">
          <button class="catalog-control-button" type="button" data-catalog-prev>Previous</button>
        </div>

        <div class="catalog-book-stage-shell">
          <div class="catalog-book-stage" data-catalog-stage>
            <div class="catalog-book-content" data-catalog-content></div>
          </div>
        </div>

        <div class="catalog-book-controls catalog-book-controls--side catalog-book-controls--right">
          <button class="catalog-control-button" type="button" data-catalog-next>Next</button>
        </div>

        <div class="catalog-book-controls catalog-book-controls--bottom">
          <div class="catalog-book-controls-group catalog-book-controls-group--center">
            <button class="catalog-control-button" type="button" data-catalog-zoom-out>Zoom -</button>
            <input class="catalog-zoom-slider" type="range" min="0.9" max="1.12" step="0.01" value="1" data-catalog-zoom>
            <button class="catalog-control-button" type="button" data-catalog-zoom-in>Zoom +</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    window.RetroCatalogConfig = {
      pages: [
        {
          title: 'Dining Table',
          description: 'A statement table with a generous top, suited to family homes, villas, and hospitality dining zones.',
          image: 'assets/img3.jpg',
          imageAlt: 'Dining table in reclaimed wood',
          specs: [
            { label: 'Wood', value: 'Reclaimed teak' },
            { label: 'Seats', value: '6 to 10' },
            { label: 'Finish', value: 'Natural oil' },
            { label: 'Use', value: 'Dining room' }
          ],
          ctaLabel: 'Enquire About Tables',
          ctaHref: 'contact.html',
          secondaryLabel: 'View Products',
          secondaryHref: 'products.html'
        },
        {
          title: 'Coffee Table',
          description: 'Low, balanced proportions with visible grain and warm tones make it an easy anchor for living spaces.',
          image: 'assets/img4.jpg',
          imageAlt: 'Coffee table detail',
          specs: [
            { label: 'Wood', value: 'Reclaimed hardwood' },
            { label: 'Height', value: 'Customisable' },
            { label: 'Finish', value: 'Matte seal' },
            { label: 'Use', value: 'Lounge / Living' }
          ],
          ctaLabel: 'Request a Quote',
          ctaHref: 'contact.html',
          secondaryLabel: 'Back to Catalog',
          secondaryHref: 'products.html'
        },
        {
          title: 'Console Table',
          description: 'Slim, architectural and adaptable for entryways, behind-sofa placement, or compact commercial spaces.',
          image: 'assets/img5.jpg',
          imageAlt: 'Console table in reclaimed wood',
          specs: [
            { label: 'Wood', value: 'Solid reclaimed wood' },
            { label: 'Width', value: 'Custom sizing' },
            { label: 'Finish', value: 'Stain or oil' },
            { label: 'Use', value: 'Entry / Display' }
          ],
          ctaLabel: 'Customise This Piece',
          ctaHref: 'contact.html',
          secondaryLabel: 'Browse Chairs',
          secondaryHref: 'chairs.html'
        },
        {
          title: 'Side Table',
          description: 'A compact companion piece that keeps the wood grain and hand-finished surface visible from every angle.',
          image: 'assets/img1.jpg',
          imageAlt: 'Side table with premium finish',
          specs: [
            { label: 'Wood', value: 'Reclaimed hardwood' },
            { label: 'Diameter', value: 'Customisable' },
            { label: 'Finish', value: 'Warm matte' },
            { label: 'Use', value: 'Bedroom / Lounge' }
          ],
          ctaLabel: 'Talk to Sales',
          ctaHref: 'contact.html',
          secondaryLabel: 'View Products',
          secondaryHref: 'products.html'
        }
      ]
    };
  </script>
  <script src="js/flipbook.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
